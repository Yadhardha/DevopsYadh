---
- name: DevOps Lab Setup
  hosts: local
  connection: local
  gather_facts: false

  tasks:

    - name: Ensure logs directory exists
      file:
        path: "{{ ansible_env.HOME }}/logs"
        state: directory
        mode: "0777"

    - name: Build Web Docker image
      community.docker.docker_image:
        name: web-image
        build:
          path: "{{ playbook_dir }}/../docker/web"
        source: build
      environment:
        DOCKER_HOST: unix:///var/run/docker.sock

    - name: Build Splunk Docker image
      community.docker.docker_image:
        name: splunk-image
        build:
          path: "{{ playbook_dir }}/../docker/monitor"
        source: build
      environment:
        DOCKER_HOST: unix:///var/run/docker.sock

    - name: Remove old containers
      shell: |
        docker rm -f web-server || true
        docker rm -f splunk-server || true
      environment:
        DOCKER_HOST: unix:///var/run/docker.sock

    - name: Run Web container
      community.docker.docker_container:
        name: web-server
        image: web-image
        state: started
        restart_policy: always
        ports:
          - "8080:80"
        volumes:
          - /logs:/logs
      environment:
        DOCKER_HOST: unix:///var/run/docker.sock

    - name: Run Splunk container
      community.docker.docker_container:
        name: splunk-server
        image: splunk-image
        state: started
        restart_policy: always
        ports:
          - "9000:8000"
        volumes:
          - /logs:/logs
      environment:
        DOCKER_HOST: unix:///var/run/docker.sock
