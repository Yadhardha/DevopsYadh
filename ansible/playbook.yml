- name: Configure DevOps Lab Servers
  hosts: localhost
  connection :localhost`  
  become: false
  gather_facts: false

  tasks:

    - name: Start Web Server Container
      docker_container:
        name: web-server
        image: web-image
        state: started
        restart_policy: always
        ports:
          - "8080:80"

    - name: Start Splunk Container
      docker_container:
        name: splunk-server
        image: splunk-image
        state: started
        restart_policy: always
        ports:
          - "9000:8000"

    - name: Install Python
      raw: apt-get update && apt-get install -y python3

    - name: Ensure /tmp directory exists
      file:
        path: /tmp
        state: directory
        mode: "1777"

    - name: Install Python3 if not present
      apt:
        name: python3
        state: present
        update_cache: yes

    - name: Copy log generator script
      copy:
        src: ../docker/monitor/log_generator.py
        dest: /tmp/log_generator.py
        mode: "0755"

    - name: Start log generator script
      shell: nohup python3 /tmp/log_generator.py > /tmp/logs.txt 2>&1 &