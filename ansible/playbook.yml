---
- name: DevOps Lab Local Setup
  hosts: localhost
  gather_facts: false
  vars:
    logs_path: "{{ playbook_dir }}/../docker/monitor/logs"
    env_file: "{{ playbook_dir }}/../docker/monitor/.env"
  tasks:
    - name: Check if Splunk exists
      command: docker ps -a -q -f name=splunk-server
      register: splunk_container
      changed_when: false

    - name: Start Splunk if it exists
      command: docker start splunk-server
      when: splunk_container.stdout != ""
    - name: Run Splunk container if not exists
      command: docker run -d --name splunk-server -p 9000:8000 -p 9997:9997 --env-file {{ env_file }} splunk/splunk
      args:
        chdir: "{{ playbook_dir }}"
      when: splunk_container.stdout == ""
