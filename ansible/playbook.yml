- name: DevOps Lab Local Setup
  hosts: localhost
  gather_facts: false
  tasks:
 
    - name: Build Web image
      command: docker build -t web-image ../docker/web
      args:
        chdir: "{{ playbook_dir }}"
 
    - name: Build Splunk image
      command: docker build -t splunk-image ../docker/monitor
      args:
        chdir: "{{ playbook_dir }}"
 
    - name: Run Web container
      command: docker run -d --name web-server -p 8080:80 web-image
 
    - name: Run Splunk container
      command: docker run -d --name splunk-server -p 9000:8000 --env-file /docker/monitor/.env splunk-image
