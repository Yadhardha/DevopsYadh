- name: Configure DevOps Lab Servers
  hosts: all
  tasks:
    - name: Install Python
      raw: apt update && apt install -y python3
    - name: Ensure curl is installed
      apt:
        name: curl
        state: present
        update_cache: yes

    - name: Create a test file
      copy:
        content: "Hello from {{ inventory_hostname }} server!"
        dest: /tmp/testfile.txt
