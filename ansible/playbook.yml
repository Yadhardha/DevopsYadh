- name: Configure DevOps Lab Servers
  hosts: web
  tasks:
    - name: Install Python
      raw: apt update && apt install -y python3
      
    - name: Ensure curl is installed
      apt:
        name: curl
        state: present
        update_cache: yes

    - name: Create a test file
      file: 
        path: /tmp/devops-test
        state: touch

    - name: Generate logs
      copy:
        content: '127.0.0.1 - - [12/Mar/2026:10:00:00] "GET / HTTP/1.1" 200'
        dest: /var/log/nginx/access.log
