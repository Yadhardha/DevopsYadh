---
- name: Configure DevOps Lab Servers
  hosts: local
  connection: local
  gather_facts: false

  tasks:

    - name: Ensure log directory exists
      ansible.builtin.file:
        path: /tmp/devops_logs
        state: directory
        mode: "0777"

    - name: Build Web Docker image
      community.docker.docker_image:
        name: web-image
        build:
          path: "{{ playbook_dir }}/../docker/web"
        source: build

    - name: Build Splunk Docker image
      community.docker.docker_image:
        name: splunk-image
        build:
          path: "{{ playbook_dir }}/../docker/monitor"
        source: build

    - name: Run Web container
      community.docker.docker_container:
        name: web-server
        image: web-image
        state: started
        restart_policy: always
        ports:
          - "8080:80"

    - name: Run Splunk container
      community.docker.docker_container:
        name: splunk-server
        image: splunk-image
        state: started
        restart_policy: always
        ports:
          - "9000:8000"
        volumes:
          - /logs:/logs

    - name: Copy log generator script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../docker/monitor/log_generator.py"
        dest: /tmp/log_generator.py
        mode: "0755"

